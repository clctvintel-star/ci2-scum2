subreddits:
  - financialcareers
  - quant
  - cscareerquestions
  - hedgefund
  - csmajors
  - internships
  - finance

collection:
  max_serpapi_pages: 7
  depth_cap: 3
  window_days: 60
  score_min: 1
  autosave_every_n_posts: 25

scoring:
  max_comments_for_prompt: 20
  autosave_every_n_rows: 25
  disagree_threshold: 0.3
  retry_limit: 3
  request_timeout: 20
  min_relevance_for_scoring: 0.25
  uncertain_keep_threshold: 0.92

models:
  expand:
    thread_detector: claude-haiku-4-5

  score:
    relevance_filter: gpt-4o-mini
    firm_link_filter: gpt-4o-mini
    uncertain_adjudicator: gpt-4o
    #primary_a: claude-haiku-4-5
    #primary_b: gpt-4o-mini
    #tiebreaker: gpt-4o
    #using below for context test
    primary_a: gemini-3.1-flash-lite-preview
    primary_b: gpt-4o-mini
    tiebreaker: gpt-4o

aggregation:
  ma_windows:
    - 28
    - 90
  thread_daily_weight_cap: 0.25
